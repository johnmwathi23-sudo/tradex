<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" fill="none">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#E5C05A"/>
    </linearGradient>
  </defs>
  <!-- Bull body -->
  <g transform="translate(5, 12)">
    <!-- Bull head -->
    <path d="M8 2 C10 0 18 0 20 2 C22 4 22 10 20 14 C18 18 12 18 10 16 C8 14 6 6 8 2Z" fill="url(#goldGrad)" opacity="0.9"/>
    <!-- Horns -->
    <path d="M10 2 C8 -4 6 -6 4 -4 C2 -2 4 0 8 2Z" fill="#D4A843"/>
    <path d="M18 2 C20 -4 22 -6 24 -4 C26 -2 24 0 20 2Z" fill="#D4A843"/>
    <!-- Africa continent shape in bull body -->
    <path d="M14 8 C16 6 22 6 26 8 C30 10 32 14 30 18 C28 22 22 24 18 22 C14 20 12 14 14 8Z" fill="#1A1D29" opacity="0.6"/>
    <!-- Bull body -->
    <path d="M20 14 C26 12 34 12 40 14 C44 16 46 18 46 22 C46 26 44 28 40 28 L22 28 C18 28 16 22 20 14Z" fill="url(#goldGrad)" opacity="0.85"/>
    <!-- Bull legs -->
    <rect x="24" y="28" width="3" height="10" rx="1" fill="url(#goldGrad)" opacity="0.7"/>
    <rect x="36" y="28" width="3" height="10" rx="1" fill="url(#goldGrad)" opacity="0.7"/>
    <!-- Tail forming X -->
    <path d="M46 22 C50 18 52 14 54 12" stroke="#D4A843" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="52" y1="10" x2="58" y2="18" stroke="#D4A843" stroke-width="2" stroke-linecap="round"/>
    <line x1="58" y1="10" x2="52" y2="18" stroke="#D4A843" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- TRADEX text -->
  <text x="70" y="40" font-family="'Playfair Display', Georgia, serif" font-size="28" font-weight="700" fill="#F5F5F5" letter-spacing="3">TRADE</text>
  <text x="160" y="40" font-family="'Playfair Display', Georgia, serif" font-size="28" font-weight="700" fill="url(#goldGrad)" letter-spacing="3">X</text>
  <!-- Tagline -->
  <text x="70" y="52" font-family="Inter, sans-serif" font-size="9" fill="#A0A0B0" letter-spacing="4">TRADE AFRICA, TRADE WORLD</text>
</svg>
